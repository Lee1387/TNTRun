# TNTRun Configuration

waiting-world:
  # Set to `true` for dedicated TNTRun network servers that should join players to the TNTRun waiting world automatically.
  # Set to `false` when players should use `/tntrun join` to enter the TNTRun waiting world themselves.
  auto-join: false
  # Queue countdown in the TNTRun waiting world once a queue becomes ready.
  ready-countdown-seconds: 30
  # Queue countdown used when a queue is already full as it begins its start path.
  full-countdown-seconds: 10
  world: "tntrun_waiting"
  spawn:
    x: 2435.5
    y: 44
    z: 2431.5
    yaw: 0.0
    pitch: 0.0

# `world` teleports players to a local world on this server.
# Required keys for `world`:
#   type: world
#   world: "world"
#   spawn:
#     x: 0.5
#     y: 64.0
#     z: 0.5
#     yaw: 0.0
#     pitch: 0.0
#
# `transfer` sends players to a different Bedrock server.
# Required keys for `transfer`:
#   type: transfer
#   address: "play.example.net"
#   port: 19132
leave-destination:
  type: world
  world: "world"
  spawn:
    x: 0.5
    y: 64.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
